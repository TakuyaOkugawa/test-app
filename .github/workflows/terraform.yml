name: Terraform Apply

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
                
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.INFRA_REPO_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        run: |
          cd infra
          terraform init
